name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore src/VoiceInput

    - name: Build
      run: dotnet build src/VoiceInput --configuration Release --no-restore

    - name: Publish
      run: |
        # Use a fallback version like 1.0.0 if not running on a tag
        $version = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "1.0.0" }
        dotnet publish src/VoiceInput --configuration Release --output publish --self-contained true --runtime win-x64 --verbosity minimal /p:Version=$version

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: VoiceInput-win-x64
        path: publish/

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: publish/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
