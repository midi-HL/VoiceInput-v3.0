name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # 安装 WinUI 3 XamlCompiler 所需的 C++ 核心工具集和桌面开发依赖
    - name: Install Windows App SDK Build Tools Dependencies
      shell: powershell
      run: |
        & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vs_installer.exe" modify `
        --installPath "C:\Program Files\Microsoft Visual Studio\2022\Enterprise" `
        --add Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
        --add Microsoft.VisualStudio.Component.Windows10SDK.19041 `
        --quiet --norestart

    # 如果是 WinUI 3 项目，发布时还原可能需要的工作负载
    - name: Install .NET Workloads
      run: dotnet workload restore src/VoiceInput/VoiceInput.csproj

    - name: Restore dependencies
      run: dotnet restore src/VoiceInput/VoiceInput.csproj -p:Configuration=Release -p:Platform=x64

    - name: Build
      run: dotnet build src/VoiceInput/VoiceInput.csproj --no-restore -c Release -p:Platform=x64

    # 使用现代 dotnet publish 替代传统 msbuild 发布的步骤
    - name: Publish
      shell: pwsh
      run: |
        $version = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}".TrimStart('v') } else { "1.0.0" }
        dotnet publish src/VoiceInput/VoiceInput.csproj -c Release -p:Platform=x64 -r win-x64 -o "${{ github.workspace }}/publish/" --self-contained true -p:Version=$version

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: VoiceInput-win-x64
        path: ${{ github.workspace }}/publish/

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ github.workspace }}/publish/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
